# this file runs database, backend, and frontend together
services:
  db:
    # this local db is optional and only runs when local profile is used
    profiles: ["local"]
    image: postgres:16-alpine
    container_name: moonshot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: moonshot_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - moonshot_pg:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: moonshot_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: moonshot_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  moonshot_pg:
